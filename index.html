<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#003DA5">
    <meta name="description" content="Nieuws • Video • Podcasts — op één plek.">
    <title>Cambuur 360</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
</head>
<body>
    <header>
        <div class="header-bg"></div>
        <div class="header-content">
            <div class="header-text">
                <h1>Cambuur <span class="accent">360</span></h1>
                <p class="subtitle">Alles rondom Cambuur</p>
            </div>
        </div>
        <button id="refreshBtn" class="refresh-btn" aria-label="Ververs">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-3-6.7L21 8"/>
                <path d="M21 3v5h-5"/>
            </svg>
        </button>
    </header>

    <nav class="tabs">
        <button class="tab active" data-tab="nieuws">📰 Nieuws</button>
        <button class="tab" data-tab="videos">🎥 Video's</button>
        <button class="tab" data-tab="podcasts">🎙️ Podcasts</button>
    </nav>

    <main>
        <section id="nieuws" class="tab-content active">
            <div id="nieuws-list" class="card-list">
                <div class="loader">Nieuws laden...</div>
            </div>
        </section>

        <section id="videos" class="tab-content">
            <div id="videos-list" class="card-list"></div>
        </section>

        <section id="podcasts" class="tab-content">
            <div id="podcasts-list" class="card-list"></div>
        </section>
    </main>

    <footer>
        <p>Cambuur 360 — niet officieel</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
